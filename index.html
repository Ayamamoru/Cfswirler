<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CFottwebs</title>
    <link rel=""icon" href="/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        html,body{height:100%}
        body{
            font-family: 'Rubik', system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(180deg,#0b2545 0%, #1e3a8a 52%, #ff7a59 100%);
            color:#fff;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:3rem;
        }
        .container{max-width:760px;width:100%;text-align:center}
        h1{font-weight:700;font-size:2.25rem;margin-bottom:0.5rem;text-transform:uppercase;color:rgba(255,255,255,0.98)}
        p{font-size:1rem;color:rgba(255,255,255,0.92);margin:.5rem 0 1rem}
        a{color:#ffd7c1}
        footer{margin-top:2rem;font-size:0.9rem;color:rgba(255,255,255,0.8);}
        footer a{color:#ffd7c1;text-decoration:underline;}
        @media (max-width:600px){h1{font-size:1.5rem;padding:0 1rem}}
    </style>
</head>
<body>
    <div class="container">
        <h1>CAMPFIRE OTTAWA</h1>
        <p>A lil campfire themed website</p>
    </div>
    <footer>
        <p>Visit <a href="https://campfire.hackclub.com/ottawa" target="_blank" rel="noopener">Campfire Ottawa</a></p>
    </footer>
</body>
</html>
